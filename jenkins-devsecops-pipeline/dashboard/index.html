<!DOCTYPE html>
<html>
<head>
    <title>DevSecOps Security Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .header { background-color: #2c3e50; color: white; padding: 20px; text-align: center; }
        .metric { display: inline-block; margin: 10px; padding: 15px; border-radius: 5px; color: white;}
        .high { background-color: #e74c3c; }
        .low { background-color: #27ae60; }
    </style>
</head>
<body>
    <div class="header"><h1>DevSecOps Security Dashboard</h1><p>Real-time Security Monitoring</p></div>
    <div style="margin: 20px 0;">
        <h2>Pipeline Status: <span style="color: #27ae60;">Active & Secured</span></h2>
        <div class="metric high"><h3>Bandit (SAST)</h3><p>0 Critical Issues</p></div>
        <div class="metric low"><h3>Trivy (Container)</h3><p>Scanned successfully</p></div>
    </div>
</body>
</html>
